<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetWear Shop - Login</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-logo {
      display: block;
      margin: 0 auto 1.5rem;
      max-height: 90px;
    }

    .login-title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .login-subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      font-size: 0.9rem;
    }

    .form-control {
      border-radius: 8px;
      border: 1.5px solid #ddd;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: #1a1a1a;
      box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.1);
    }

    .input-group .form-control {
      border-right: none;
    }

    .input-group .btn-toggle-pw {
      border: 1.5px solid #ddd;
      border-left: none;
      border-radius: 0 8px 8px 0;
      background: #f8f9fa;
      color: #666;
      padding: 0 0.9rem;
    }

    .input-group .btn-toggle-pw:hover {
      background: #e9ecef;
      color: #333;
    }

    .btn-login {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover {
      background: #333;
      color: #fff;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .alert-error {
      background: #fff3f3;
      border: 1px solid #f5c2c2;
      color: #c0392b;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      display: none;
      margin-top: 1rem;
    }

    .alert-error.show {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <img src="/img/logo.png" alt="StreetWear Shop" class="login-logo">
      <h1 class="login-title">Área Administrativa</h1>
      <p class="login-subtitle">Faça login para continuar</p>

      <form id="loginForm" onsubmit="fazerLogin(event)" novalidate>
        <div class="mb-3">
          <label for="usuario" class="form-label">Usuário</label>
          <input
            type="text"
            id="usuario"
            class="form-control"
            placeholder="Digite seu usuário"
            autocomplete="username"
            required
          >
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <div class="input-group">
            <input
              type="password"
              id="senha"
              class="form-control"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            >
            <button type="button" class="btn-toggle-pw" onclick="toggleSenha()" tabindex="-1">
              <i class="bi bi-eye" id="iconeSenha"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>

        <div class="alert-error" id="erroLogin">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span>Usuário ou senha incorretos.</span>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Se já estiver logado, redireciona direto para o site
    if (sessionStorage.getItem('adminLogado') === 'true') {
      window.location.href = 'index.html';
    }

    async function fazerLogin(event) {
      event.preventDefault();

      const usuario = document.getElementById('usuario').value.trim();
      const senha = document.getElementById('senha').value;
      const erro = document.getElementById('erroLogin');
      const erroSpan = erro.querySelector('span');
      const btnLogin = document.querySelector('.btn-login');

      erro.classList.remove('show');
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

      try {
        const response = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, senha })
        });

        const dados = await response.json();

        if (dados.sucesso) {
          sessionStorage.setItem('adminLogado', 'true');
          sessionStorage.setItem('adminUsuario', dados.usuario);
          window.location.href = 'index.html';
        } else {
          erroSpan.textContent = dados.mensagem || 'Usuário ou senha incorretos.';
          erro.classList.add('show');
          document.getElementById('senha').value = '';
          document.getElementById('senha').focus();
        }
      } catch (err) {
        erroSpan.textContent = 'Não foi possível conectar ao servidor.';
        erro.classList.add('show');
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
      }
    }

    function toggleSenha() {
      const input = document.getElementById('senha');
      const icone = document.getElementById('iconeSenha');
      if (input.type === 'password') {
        input.type = 'text';
        icone.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icone.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
